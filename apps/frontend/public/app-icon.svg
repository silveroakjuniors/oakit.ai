<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0f2417"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#1e5c3a" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#0f2417" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Oak leaf / tree icon above text -->
  <g transform="translate(256, 185)">
    <!-- Trunk -->
    <rect x="-8" y="30" width="16" height="38" rx="4" fill="#4ade80" opacity="0.9"/>
    <!-- Main circle (canopy) -->
    <circle cx="0" cy="0" r="52" fill="#22c55e"/>
    <!-- Highlight -->
    <circle cx="-14" cy="-16" r="28" fill="#4ade80" opacity="0.5"/>
    <!-- Small dot accent (Oakie eye) -->
    <circle cx="18" cy="-8" r="10" fill="#f59e0b"/>
  </g>

  <!-- OAKIT text -->
  <text
    x="256"
    y="330"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="82"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    letter-spacing="-2"
  >OAKIT</text>

  <!-- .ai subtitle -->
  <text
    x="256"
    y="378"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="36"
    font-weight="500"
    fill="#4ade80"
    text-anchor="middle"
    letter-spacing="4"
  >.ai</text>
</svg>
